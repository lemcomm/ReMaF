tourn:
 create:
  name:       Announce a Tournament
  description: Why not hold a competition?
  intro:      The ultimate proving ground of your capabilities, be it your skill in combat or your mastery of wealth in hosting one. From this page you can determine the type of tournament you wish to hold. Be advised, if you wish to hold more than a single type, you'll need a Tournament Grounds and the infrastructure it provides.
 announce:
  meleetournament:
   flash:     A Melee Tournament has been scheduled.
  joust:
   flash:     A Joust has been scheduled.
  race:
   flash:     A Race has been scheduled.
  grandtournament:
   flash:     A Grand Tournament has been scheduled.
  delay:      A far reaching message announcing it will go out in a few minutes.
  failed:     Tournament creation failed. Please report this to the admins, as it shouldn't be possible to get this message.
 form:
  name:       Tournament Name
  delay:
   label:     "How far out shall it be scheduled?"
