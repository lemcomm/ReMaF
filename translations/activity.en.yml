 unknown: You've never caught that fish so you know nothing about it.


fish:
 locale:
 silk sher:
  name: Silk Sher
  desc: >
   A colossal, aquatic creature with a feline head and canine muzzle. 
   It has a long catfish body with four, relative to it's size, small catfish like fins and a turtle tail.
   The silk sher's body is covered in thick skin with pastel green swirls across a deep blue.
 relerast:
  name: Relerast
  desc: > 
   A large, aquatic creature with a tubular head, no eyes, and a camel-like mouth.
   It has a stumpy orca body with eight enormous dugong-like flippers, a very small dorsal fin and a powerful tail.
   The Relerast's whole body is covered in thin scales and it is completely chocolate brown with brown spots.
 pygmy viorly:
  name: Pygmy Viorly
  desc: >
   A medium, aquatic creature with an armadillo head covered with bony protrusions, and a pointed snout.
   It has a elongated trout body with six very small shark-like fins, a very large dorsal fin and a dolphin tail.
   The Pygmy Viorly's body is covered in thin scales. 
   Most of its body is chocolate brown with grey patches, while the rest of its body is straw with grey patches.
 giant iserlane:
  name: Giant Iserlane
  desc: >
   A large, aquatic creature with a dolphin head, two sheep eyes, and a short snout with no teeth.
   It has a elongated catfish body with eight miniature shark-like fins, a large dorsal fin and a walrus tail.
   The Giant Iserane's whole body is covered in rock-like skin.
   It has the markings of a raccoon in dark blue, vivid orange and grey.
 wiunk:
  name: Wiunk
  desc: >
   A medium, aquatic creature with a giraffe head covered with medium-length horns, four sheep eyes on flexible stalks, and a bottlenose dolphin-like snout filled with serrated teeth.
   It has a long shark body with eight elongated penguin-like flippers, an enormous dorsal fin and a dolphin tail.
   The Wiunk's whole body is covered in thin skin that releases oily secretions, except its face which is covered in delicate scales.
   It is mostly mahogany, with off-white sections and white highlights, while its upper body is dull green and mottled straw.
 osene:
  name: Osene
  desc: >
   A massive, aquatic creature with an eagle head with two very long horns above the brow, and a long snout.
   It has a short orca body with six stunted sea-lion-like flippers, a very small dorsal fin and a manatee tail.
   The Osene's back is covered in thick slime, while the rest of its body is covered in delicate scales.
   It is light purple with light brown diamonds on one half, and dull blue off-white on the other; the two areas are separated by a thin, light gray line. Meanwhile, its appendages are deep blue.
