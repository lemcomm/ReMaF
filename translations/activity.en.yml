   label:     Which Type of Fights shall be held?
   solo:      Solo (1 vs 1) fights
   duo:       Duo (2 vs 2) fights
   team:      Team (5 vs 5) fights
   ffa:       Free-for-all fights
   all:       All types
   weapon:    Which weapons shall be allowed? (Selecting none is the same as all.)
   armor:     Allow armor in combat?
   notGrand:  To hold multiple fight types, you must be able to host a Grand Tournament (able to do fights, races, and jousts, and have a Tournament Grounds).
  joustTypes:
   label:     Include a joust?
   joust:     Jousts
  notGrand:   Only a settlement with a dedicated Tournament Grounds has the facilities to host multiple tournaments at once.
  racesTypes:
   label:     Include races?
   races:      Races
  submit:     Announce Tournament!

