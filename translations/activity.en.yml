   A large, aquatic creature with an egg-shaped head, two enormous light blue eyes, a long trunk, and a bottlenose dolphin-like snout filled with small, sharp teeth.
   It has a elongated sea-lion body with four elongated sea-lion-like flippers, a miniature dorsal fin and a powerful tail.
   The Nete's body is covered in gelatinous skin.
   Most of its body is dark green, while the rest of its body is lime green.
 nertat:
  name: Nertat
  desc: >
   A large, aquatic creature with a vulture head, two sheep eyes, and a long snout with two very long canines.
   It has a elongated eel body with no fins, and a dugong tail.
   The Nertat's whole body is covered in tough skin, except its face which is covered in delicate scales.
   It is completely blue.
 wood-vatertin:
  name: Wood-Vatertin
  desc: >
   A medium, aquatic creature with a snake head with a very long horn on the forehead, two snake eyes, an elephant trunk, and a pointed snout filled with sharp teeth.
   It has a stubby trout body with eight enormous catfish-like fins, a small dorsal fin and a dugong tail.
   The Wood-Vatertin's whole body is covered in an exoskeleton.
   It is black on one half, and light gray grey on the other; the two areas are separated by a thin, light green line. Meanwhile, its appendages are off-white with cream rings.
 great crested hanonte:
  name: Great Crested Hanonte
  desc: >
   A medium, aquatic creature with a domed head, no eyes, and a pair of piercing mandibles.
   It has a long eel body with no fins, and a fragile tail.
   The Great Crested Hanonte's body is covered in thin skin beneath very thick mucus.
   It is completely white.
 erinel:
  name: Erinel
  desc: >
   A very large, aquatic creature with a rat head, two human eyes, and an indented jaw.
   It has a elongated slug body with no fins, and an orca tail.
   The Erinel's body is covered in an exoskeleton.
   It is completely black with dark gray rings.
 shire usein:
  name: Shire Usein
  desc: >
   A very large, aquatic creature with a moose head covered with bony protrusions, no eyes, and a camel-like mouth.
   It has a long trout body with six large shark-like fins, a small dorsal fin and a dolphin tail.
   The Shire Usein's body is covered in fish scales, and thin scales.
   It has the markings of a giraffe in dark gray and ochre.
 trer:
  name: Trer
  desc: >
   A very large, aquatic creature with an anteater head covered with long horns, six dark yellow serpentine eyes, and a feline muzzle filled with small, sharp teeth.
   It has a medium-length catfish body with four large catfish-like fins, a miniature dorsal fin and a manatee tail.
   The Trer's whole body is covered in rock-like skin, except its tail which is covered in thin scales.
   It is completely dull green.
 rite:
  name: Rite
  desc: >
   A very large, aquatic creature with a wide head covered with deep grooves, two wide grey eyes, and a long jaw filled with blunt teeth.
   It has a elongated seal body with four stunted dolphin-like flippers, an enormous dorsal fin and a delicate tail.
   The Rite's head, neck, shoulders and back are covered in thick, rubbery skin, while the rest of its body is covered in delicate scales.
   It is completely sky blue with pastel green patches.
 athabe:
  name: Athabe
  desc: >
   A medium, aquatic creature with a snake head, no eyes, and a pointed snout.
   It has a short trout body with eight enormous catfish-like fins, a very small dorsal fin and a dolphin tail.
   The Athabe's head is covered in thin scales, while the rest of its body is covered in a tough hide.
   It is pastel orange, green-blue and light brown.
 emperor sustred:
  name: Emperor Sustred
  desc: >
   A large, aquatic creature with a wedge shaped head with a fleshy crest on its head, two complex black eyes, a small nose, and a protruding jaw filled with blunt teeth.
   It has a short sea-lion body with four very small seal-like flippers, a very large dorsal fin and a seal tail.
   The Emperor Sustred's whole body is covered in an exoskeleton, except its tail which is covered in thin scales.
   Most of its body is vivid yellow, while the rest of its body is sandy yellow with straw bands.
 spra:
  name: Spra
  desc: >
   A massive, aquatic creature with a skeletal head with a short horn on the forehead, two large forest green eyes, and a pointed snout.
   It has a medium-length slug body with no fins, and a fragile tail.
   The Spra's body is covered in tough scales.
   It is light yellow, cream, ochre, sandy yellow and cream.

