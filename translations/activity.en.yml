   It has a long shark body with four stunted leviathan-like flippers, an elongated dorsal fin and a seal tail.
   The Mana's whole body is covered in fish scales, except its tail which is covered in thin scales.
   Most of its body is cream, while the rest of its body is deep blue with dark brown spirals.
