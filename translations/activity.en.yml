 start:
  name: Go Fishing?
  description: Find inner peace.
  desc: Have you found the daily toil a bit too much? Has it driven you to want to scream in frustration? Take a break, then. Try fishing. Maybe you'll catch something, maybe you won't, but the time to yourself will be invaluable.
  flash: You grab your pole and set out for some peace, quiet, and fish.
